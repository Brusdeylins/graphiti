# Graphiti MCP Server Configuration
# This file supports environment variable expansion using ${VAR_NAME} or ${VAR_NAME:default_value}
#
# IMPORTANT: Set SEMAPHORE_LIMIT environment variable to control episode processing concurrency
# Default: 10 (suitable for OpenAI Tier 3, mid-tier Anthropic)
# See README.md "Concurrency and LLM Provider 429 Rate Limit Errors" section for tuning guidance

server:
  transport: "http"  # Options: stdio, sse (deprecated), http
  host: "0.0.0.0"
  port: 8000

  # Transport security settings for remote access (behind reverse proxy)
  # Uncomment and configure if accessing via custom domain:
  # allowed_hosts:
  #   - "localhost:8000"
  #   - "graphiti.example.com"
  # allowed_origins:
  #   - "http://localhost:3000"
  #   - "https://app.example.com"
  # enable_dns_rebinding_protection: true  # Default: true

llm:
  provider: "openai"  # Options: openai, azure_openai, anthropic, gemini, groq
  model: ${LLM_MODEL:gpt-4o-mini}
  small_model: ${LLM_SMALL_MODEL:}  # Optional: Model for lightweight tasks (defaults to main model)
                                     # For Ollama/local LLMs: set to same as main model
  is_reasoning: ${LLM_IS_REASONING:}  # Optional: Set true for reasoning models
                                       # Auto-detected for gpt-5/o1/o3 if not set
  small_is_reasoning: ${LLM_SMALL_IS_REASONING:}  # Optional: Set true if small model is a reasoning model
  max_tokens: 4096
  
  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}
      organization_id: ${OPENAI_ORGANIZATION_ID:}
      
    azure_openai:
      api_key: ${AZURE_OPENAI_API_KEY}
      api_url: ${AZURE_OPENAI_ENDPOINT}
      api_version: ${AZURE_OPENAI_API_VERSION:2024-10-21}
      deployment_name: ${AZURE_OPENAI_DEPLOYMENT}
      use_azure_ad: ${USE_AZURE_AD:false}
      
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      api_url: ${ANTHROPIC_API_URL:https://api.anthropic.com}
      max_retries: 3
      
    gemini:
      api_key: ${GOOGLE_API_KEY}
      project_id: ${GOOGLE_PROJECT_ID:}
      location: ${GOOGLE_LOCATION:us-central1}
      
    groq:
      api_key: ${GROQ_API_KEY}
      api_url: ${GROQ_API_URL:https://api.groq.com/openai/v1}

embedder:
  provider: "openai"  # Options: openai, azure_openai, gemini, voyage
  model: ${EMBEDDING_MODEL:text-embedding-3-small}
  dimensions: ${EMBEDDING_DIM:1536}
  
  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}
      organization_id: ${OPENAI_ORGANIZATION_ID:}
      
    azure_openai:
      api_key: ${AZURE_OPENAI_API_KEY}
      api_url: ${AZURE_OPENAI_EMBEDDINGS_ENDPOINT}
      api_version: ${AZURE_OPENAI_API_VERSION:2024-10-21}
      deployment_name: ${AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT}
      use_azure_ad: ${USE_AZURE_AD:false}
      
    gemini:
      api_key: ${GOOGLE_API_KEY}
      project_id: ${GOOGLE_PROJECT_ID:}
      location: ${GOOGLE_LOCATION:us-central1}
      
    voyage:
      api_key: ${VOYAGE_API_KEY}
      api_url: ${VOYAGE_API_URL:https://api.voyageai.com/v1}
      model: "voyage-3"

database:
  provider: "falkordb"  # Default: falkordb. Options: neo4j, falkordb

  providers:
    falkordb:
      uri: ${FALKORDB_URI:redis://localhost:6379}
      password: ${FALKORDB_PASSWORD:}
      database: ${FALKORDB_DATABASE:default_db}

    neo4j:
      uri: ${NEO4J_URI:bolt://localhost:7687}
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD}
      database: ${NEO4J_DATABASE:neo4j}
      use_parallel_runtime: ${USE_PARALLEL_RUNTIME:false}

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:main}
  episode_id_prefix: ${EPISODE_ID_PREFIX:}
  user_id: ${USER_ID:mcp_user}
  # Entity types based on Schema.org, IEEE 830, and Dublin Core standards
  # Fields are optional structured attributes extracted by the LLM
  entity_types:
    # === Core Personal/Organizational Entities (Schema.org) ===
    - name: "Person"
      description: "A human individual - user, contact, author, participant, or any named person"
      fields:
        - name: "email"
          type: "str"
          required: false
          description: "Email address"
        - name: "phone"
          type: "str"
          required: false
          description: "Phone number"
        - name: "role"
          type: "str"
          required: false
          description: "Job title, function, or relationship role"
        - name: "affiliation"
          type: "str"
          required: false
          description: "Organization or group the person belongs to"

    - name: "Organization"
      description: "Company, institution, team, group, or any formal entity"
      fields:
        - name: "org_type"
          type: "str"
          required: false
          description: "Type: company, nonprofit, government, team, department"
        - name: "industry"
          type: "str"
          required: false
          description: "Industry sector or domain"
        - name: "website"
          type: "str"
          required: false
          description: "Website URL"
        - name: "location"
          type: "str"
          required: false
          description: "Headquarters or primary location"

    # === Spatial/Temporal Entities (Schema.org) ===
    - name: "Location"
      description: "Physical place, virtual location, network address, or geographic area"
      fields:
        - name: "address"
          type: "str"
          required: false
          description: "Street address or postal address"
        - name: "city"
          type: "str"
          required: false
          description: "City or locality name"
        - name: "country"
          type: "str"
          required: false
          description: "Country name or code"
        - name: "coordinates"
          type: "str"
          required: false
          description: "GPS coordinates (lat,lon) if known"
        - name: "ip_address"
          type: "str"
          required: false
          description: "IP address or hostname for virtual locations"
        - name: "location_type"
          type: "str"
          required: false
          description: "Type: physical, virtual, network, geographic"

    - name: "Event"
      description: "Time-bound occurrence, activity, meeting, or experience"
      fields:
        - name: "start_date"
          type: "str"
          required: false
          description: "Start date/time (ISO 8601 format)"
        - name: "end_date"
          type: "str"
          required: false
          description: "End date/time (ISO 8601 format)"
        - name: "status"
          type: "str"
          required: false
          description: "Status: scheduled, in_progress, completed, cancelled"
        - name: "event_type"
          type: "str"
          required: false
          description: "Type: meeting, conference, deadline, milestone, incident"
        - name: "recurrence"
          type: "str"
          required: false
          description: "Recurrence pattern if applicable (daily, weekly, etc.)"

    # === User Preference/Behavior Entities ===
    - name: "Preference"
      description: "User choice, opinion, setting, or selection - PRIORITIZE for personal preferences"
      fields:
        - name: "category"
          type: "str"
          required: false
          description: "Category: UI, workflow, communication, technical, personal"
        - name: "value"
          type: "str"
          required: false
          description: "The preferred value or choice"
        - name: "strength"
          type: "str"
          required: false
          description: "Preference strength: strong, moderate, weak"

    # === Requirements Management Entities (IEEE 830 / ISO 29148) ===
    - name: "Requirement"
      description: "Functional or non-functional requirement, feature request, or specification"
      fields:
        - name: "req_type"
          type: "str"
          required: false
          description: "Type: functional, non_functional, constraint, interface"
        - name: "priority"
          type: "str"
          required: false
          description: "Priority: must_have, should_have, could_have, wont_have (MoSCoW)"
        - name: "status"
          type: "str"
          required: false
          description: "Status: proposed, approved, implemented, verified, deferred"
        - name: "acceptance_criteria"
          type: "str"
          required: false
          description: "Conditions for requirement satisfaction"
        - name: "source"
          type: "str"
          required: false
          description: "Origin: stakeholder, regulation, technical, business"
        - name: "version"
          type: "str"
          required: false
          description: "Requirement version number"

    # === Document/Content Entities (Dublin Core) ===
    - name: "Document"
      description: "Information resource: file, article, report, book, specification, or any content"
      fields:
        - name: "title"
          type: "str"
          required: false
          description: "Document title"
        - name: "creator"
          type: "str"
          required: false
          description: "Author or creator name"
        - name: "date"
          type: "str"
          required: false
          description: "Creation or publication date"
        - name: "format"
          type: "str"
          required: false
          description: "Format: pdf, markdown, html, docx, text"
        - name: "identifier"
          type: "str"
          required: false
          description: "Unique identifier: URL, DOI, ISBN, file path"
        - name: "language"
          type: "str"
          required: false
          description: "Content language (ISO 639-1 code)"
        - name: "doc_type"
          type: "str"
          required: false
          description: "Type: specification, manual, report, article, contract"

    # === Operational Entities ===
    - name: "Procedure"
      description: "Step-by-step process, workflow, standard operating procedure, or instruction set"
      fields:
        - name: "steps"
          type: "str"
          required: false
          description: "Numbered steps or stages"
        - name: "trigger"
          type: "str"
          required: false
          description: "What initiates this procedure"
        - name: "outcome"
          type: "str"
          required: false
          description: "Expected result or output"
        - name: "frequency"
          type: "str"
          required: false
          description: "How often: once, daily, weekly, on_demand"

    # === Technical Entities ===
    - name: "Technology"
      description: "Software, tool, framework, language, API, or technical component"
      fields:
        - name: "tech_type"
          type: "str"
          required: false
          description: "Type: language, framework, database, service, tool"
        - name: "version"
          type: "str"
          required: false
          description: "Version number or release"
        - name: "license"
          type: "str"
          required: false
          description: "License type: MIT, Apache, proprietary, etc."
        - name: "url"
          type: "str"
          required: false
          description: "Documentation or repository URL"

    # === Fallback Entities (use sparingly) ===
    - name: "Topic"
      description: "Subject area, knowledge domain, or theme - use when no specific type fits"
      fields:
        - name: "domain"
          type: "str"
          required: false
          description: "Knowledge domain or field"
        - name: "keywords"
          type: "str"
          required: false
          description: "Related keywords (comma-separated)"

    - name: "Object"
      description: "Physical item, device, possession, or tangible thing - use as last resort"
      fields:
        - name: "object_type"
          type: "str"
          required: false
          description: "Category: device, tool, furniture, vehicle, etc."
        - name: "brand"
          type: "str"
          required: false
          description: "Manufacturer or brand name"
        - name: "model"
          type: "str"
          required: false
          description: "Model number or name"
# Graphiti MCP Server Configuration
# This file supports environment variable expansion using ${VAR_NAME} or ${VAR_NAME:default_value}
#
# IMPORTANT: Set SEMAPHORE_LIMIT environment variable to control episode processing concurrency
# Default: 10 (suitable for OpenAI Tier 3, mid-tier Anthropic)
# See README.md "Concurrency and LLM Provider 429 Rate Limit Errors" section for tuning guidance

server:
  transport: "http"  # Options: stdio, sse (deprecated), http
  host: "0.0.0.0"
  port: 8000

  # Transport security settings for remote access (behind reverse proxy)
  # Uncomment and configure if accessing via custom domain:
  # allowed_hosts:
  #   - "localhost:8000"
  #   - "graphiti.example.com"
  # allowed_origins:
  #   - "http://localhost:3000"
  #   - "https://app.example.com"
  # enable_dns_rebinding_protection: true  # Default: true

llm:
  provider: "openai"  # Options: openai, azure_openai, anthropic, gemini, groq
  model: ${LLM_MODEL:gpt-4o-mini}
  small_model: ${LLM_SMALL_MODEL:}  # Optional: Model for lightweight tasks (defaults to main model)
                                     # For Ollama/local LLMs: set to same as main model
  is_reasoning: ${LLM_IS_REASONING:}  # Optional: Set true for reasoning models
                                       # Auto-detected for gpt-5/o1/o3 if not set
  small_is_reasoning: ${LLM_SMALL_IS_REASONING:}  # Optional: Set true if small model is a reasoning model
  max_tokens: 4096
  
  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}
      organization_id: ${OPENAI_ORGANIZATION_ID:}
      
    azure_openai:
      api_key: ${AZURE_OPENAI_API_KEY}
      api_url: ${AZURE_OPENAI_ENDPOINT}
      api_version: ${AZURE_OPENAI_API_VERSION:2024-10-21}
      deployment_name: ${AZURE_OPENAI_DEPLOYMENT}
      use_azure_ad: ${USE_AZURE_AD:false}
      
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      api_url: ${ANTHROPIC_API_URL:https://api.anthropic.com}
      max_retries: 3
      
    gemini:
      api_key: ${GOOGLE_API_KEY}
      project_id: ${GOOGLE_PROJECT_ID:}
      location: ${GOOGLE_LOCATION:us-central1}
      
    groq:
      api_key: ${GROQ_API_KEY}
      api_url: ${GROQ_API_URL:https://api.groq.com/openai/v1}

embedder:
  provider: "openai"  # Options: openai, azure_openai, gemini, voyage
  model: ${EMBEDDING_MODEL:text-embedding-3-small}
  dimensions: ${EMBEDDING_DIM:1536}
  
  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}
      organization_id: ${OPENAI_ORGANIZATION_ID:}
      
    azure_openai:
      api_key: ${AZURE_OPENAI_API_KEY}
      api_url: ${AZURE_OPENAI_EMBEDDINGS_ENDPOINT}
      api_version: ${AZURE_OPENAI_API_VERSION:2024-10-21}
      deployment_name: ${AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT}
      use_azure_ad: ${USE_AZURE_AD:false}
      
    gemini:
      api_key: ${GOOGLE_API_KEY}
      project_id: ${GOOGLE_PROJECT_ID:}
      location: ${GOOGLE_LOCATION:us-central1}
      
    voyage:
      api_key: ${VOYAGE_API_KEY}
      api_url: ${VOYAGE_API_URL:https://api.voyageai.com/v1}
      model: "voyage-3"

database:
  provider: "falkordb"  # Default: falkordb. Options: neo4j, falkordb

  providers:
    falkordb:
      uri: ${FALKORDB_URI:redis://localhost:6379}
      password: ${FALKORDB_PASSWORD:}
      database: ${FALKORDB_DATABASE:default_db}

    neo4j:
      uri: ${NEO4J_URI:bolt://localhost:7687}
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD}
      database: ${NEO4J_DATABASE:neo4j}
      use_parallel_runtime: ${USE_PARALLEL_RUNTIME:false}

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:main}
  episode_id_prefix: ${EPISODE_ID_PREFIX:}
  user_id: ${USER_ID:mcp_user}
  # Entity types based on Schema.org, IEEE 830, and Dublin Core standards
  #
  # DESIGN PRINCIPLES:
  # - Fields = Intrinsic scalar values (dates, numbers, enums, identifiers, contact info)
  # - Edges = Relationships to other entities (extracted automatically by LLM)
  #   Example: Person→Organization is an EDGE, not a field "affiliation"
  #
  # DO NOT add fields for relationships - the LLM creates edges automatically:
  #   ✗ Person.affiliation (wrong - should be edge Person→Organization)
  #   ✗ Organization.location (wrong - should be edge Organization→Location)
  #   ✓ Person.birth_date (correct - scalar value)
  #   ✓ Person.email (correct - contact identifier)
  #
  entity_types:
    # === Core Personal/Organizational Entities (Schema.org) ===
    - name: "Person"
      description: "A human individual - user, contact, author, participant, or any named person. Edges: →Organization (employer, member_of), →Person (spouse, parent, child, sibling, friend, colleague), →Location (residence, birthplace, workplace), →Event (attends, organizes)."
      fields:
        - name: "title"
          type: "str"
          required: false
          description: "Academic/professional title: Dr., Prof., Dipl.-Ing., etc."
        - name: "first_name"
          type: "str"
          required: false
          description: "First/given name (Rufname)"
        - name: "middle_names"
          type: "str"
          required: false
          description: "Middle names (comma-separated if multiple)"
        - name: "last_name"
          type: "str"
          required: false
          description: "Last/family name"
        - name: "email"
          type: "str"
          required: false
          description: "Email address"
        - name: "phone"
          type: "str"
          required: false
          description: "Phone number (landline)"
        - name: "mobile"
          type: "str"
          required: false
          description: "Mobile phone number"
        - name: "birth_date"
          type: "str"
          required: false
          description: "Date of birth (ISO 8601: YYYY-MM-DD)"
        - name: "gender"
          type: "str"
          required: false
          description: "Gender: male, female, other, unknown"
        - name: "nationality"
          type: "str"
          required: false
          description: "Nationality (ISO 3166-1 country code)"
        - name: "job_title"
          type: "str"
          required: false
          description: "Current job title or profession"

    - name: "Organization"
      description: "Company, institution, team, group, or any formal entity. Edges: →Location (headquarters, branch, office), →Person (founder, ceo, employee, member), →Organization (parent_company, subsidiary, partner), →NetworkEndpoint (website, api)."
      fields:
        - name: "type"
          type: "str"
          required: false
          description: "Type: company, nonprofit, government, team, department, university"
        - name: "industry"
          type: "str"
          required: false
          description: "Industry sector"
        - name: "founded_date"
          type: "str"
          required: false
          description: "Founding date (ISO 8601)"
        - name: "tax_id"
          type: "str"
          required: false
          description: "Tax ID, VAT number, or registration number"

    # === Spatial/Temporal Entities (Schema.org) ===
    - name: "Location"
      description: "Physical place or geographic area. Virtual/network locations use NetworkEndpoint instead. Edges: →Location (part_of, near - e.g., city→country)."
      fields:
        - name: "address"
          type: "str"
          required: false
          description: "Full street address"
        - name: "postal_code"
          type: "str"
          required: false
          description: "Postal/ZIP code"
        - name: "city"
          type: "str"
          required: false
          description: "City or locality name"
        - name: "country"
          type: "str"
          required: false
          description: "Country (ISO 3166-1 code)"
        - name: "coordinates"
          type: "str"
          required: false
          description: "GPS coordinates (lat,lon)"
        - name: "type"
          type: "str"
          required: false
          description: "Type: address, city, region, country, building, room, area"

    - name: "Event"
      description: "Time-bound occurrence, activity, or meeting. Edges: →Person (organizer, participant, speaker), →Location (venue), →Organization (host, sponsor), →NetworkEndpoint (meeting_link, registration_url), →Event (part_of, follows)."
      fields:
        - name: "start_date"
          type: "str"
          required: false
          description: "Start date/time (ISO 8601)"
        - name: "end_date"
          type: "str"
          required: false
          description: "End date/time (ISO 8601)"
        - name: "status"
          type: "str"
          required: false
          description: "Status: scheduled, in_progress, completed, cancelled"
        - name: "type"
          type: "str"
          required: false
          description: "Type: meeting, conference, deadline, milestone, incident, birthday, holiday"
        - name: "recurrence"
          type: "str"
          required: false
          description: "Recurrence: once, daily, weekly, monthly, yearly"

    # === User Preference/Behavior Entities ===
    - name: "Preference"
      description: "User choice, opinion, setting, or selection - PRIORITIZE for personal preferences. Edges: →Person (held_by), →Topic (about), →Technology (prefers)."
      fields:
        - name: "category"
          type: "str"
          required: false
          description: "Category: ui, workflow, communication, technical, food, lifestyle"
        - name: "value"
          type: "str"
          required: false
          description: "The preferred value or choice"
        - name: "strength"
          type: "str"
          required: false
          description: "Strength: must, prefer, like, dislike, avoid, never"

    # === Requirements Management Entities (IEEE 830 / ISO 29148) ===
    - name: "Requirement"
      description: "Functional or non-functional requirement, feature request, or specification. Edges: →Person (requested_by, assigned_to), →Organization (stakeholder), →Technology (requires, implements), →Requirement (depends_on, conflicts_with)."
      fields:
        - name: "type"
          type: "str"
          required: false
          description: "Type: functional, performance, security, usability, constraint"
        - name: "priority"
          type: "str"
          required: false
          description: "MoSCoW: must_have, should_have, could_have, wont_have"
        - name: "status"
          type: "str"
          required: false
          description: "Status: draft, proposed, approved, implemented, verified, rejected"
        - name: "acceptance_criteria"
          type: "str"
          required: false
          description: "Testable conditions for satisfaction"
        - name: "version"
          type: "str"
          required: false
          description: "Version number (semver)"

    # === Document/Content Entities (Dublin Core) ===
    - name: "Document"
      description: "Information resource: file, article, report, book. Edges: →Person (author, editor, reviewer), →Organization (publisher), →Topic (about), →Document (references, version_of), →NetworkEndpoint (url, download_link)."
      fields:
        - name: "title"
          type: "str"
          required: false
          description: "Document title"
        - name: "publication_date"
          type: "str"
          required: false
          description: "Publication date (ISO 8601)"
        - name: "format"
          type: "str"
          required: false
          description: "Format: pdf, markdown, html, docx, txt, epub"
        - name: "identifier"
          type: "str"
          required: false
          description: "Unique ID: DOI, ISBN, file path"
        - name: "language"
          type: "str"
          required: false
          description: "Content language (ISO 639-1: en, de, fr)"
        - name: "type"
          type: "str"
          required: false
          description: "Type: specification, manual, report, article, contract, email"

    # === Operational Entities ===
    - name: "Procedure"
      description: "Step-by-step process, workflow, or instruction set. Edges: →Person (responsible, executor), →Technology (uses), →Document (documented_in), →Procedure (sub_procedure, follows)."
      fields:
        - name: "steps"
          type: "str"
          required: false
          description: "Numbered steps or stages"
        - name: "trigger"
          type: "str"
          required: false
          description: "What initiates this procedure"
        - name: "outcome"
          type: "str"
          required: false
          description: "Expected result or output"
        - name: "frequency"
          type: "str"
          required: false
          description: "Frequency: once, daily, weekly, on_demand"

    # === Technical Entities ===
    - name: "Technology"
      description: "Software, tool, framework, language, or technical component. Edges: →Technology (depends_on, alternative_to, built_with), →Organization (developed_by, maintained_by), →NetworkEndpoint (repository, documentation, homepage), →Domain (belongs_to)."
      fields:
        - name: "type"
          type: "str"
          required: false
          description: "Type: language, framework, database, service, tool, library"
        - name: "version"
          type: "str"
          required: false
          description: "Version number (semver)"
        - name: "license"
          type: "str"
          required: false
          description: "License: MIT, Apache-2.0, GPL-3.0, proprietary"

    - name: "NetworkEndpoint"
      description: "Network address, URL, API endpoint, or connection URI. A URL IS a NetworkEndpoint. Edges: →Organization (owned_by, hosted_by), →Technology (serves, runs), →Location (hosted_in - data center location)."
      fields:
        - name: "protocol"
          type: "str"
          required: false
          description: "Protocol: http, https, ssh, redis, postgresql, mongodb, mqtt, grpc"
        - name: "host"
          type: "str"
          required: false
          description: "Hostname, IP address, or domain"
        - name: "port"
          type: "str"
          required: false
          description: "Port number"
        - name: "path"
          type: "str"
          required: false
          description: "URL path or resource path"
        - name: "type"
          type: "str"
          required: false
          description: "Type: api, database, website, service, ssh, vpn, websocket"

    # === Knowledge Organization Entities ===
    - name: "Domain"
      description: "Knowledge domain, field of expertise, or subject area (e.g., 'Software Engineering', 'Medicine', 'Cooking'). Edges: →Domain (parent_domain, related_to)."
      fields:
        - name: "type"
          type: "str"
          required: false
          description: "Type: academic, professional, hobby, industry, science"

    - name: "Topic"
      description: "Specific subject or theme within a domain (e.g., 'Python', 'Heart Surgery', 'Italian Cuisine'). Edges: →Domain (belongs_to), →Topic (related_to, prerequisite_of)."
      fields:
        - name: "keywords"
          type: "str"
          required: false
          description: "Related keywords (comma-separated)"

    # === Physical Items (use sparingly) ===
    - name: "Item"
      description: "Physical object, device, or tangible thing (e.g., 'MacBook Pro', 'Toyota Corolla', 'Office Chair'). Edges: →Person (owned_by, used_by), →Organization (owned_by, manufactured_by), →Location (located_at)."
      fields:
        - name: "type"
          type: "str"
          required: false
          description: "Category: device, tool, furniture, vehicle, appliance"
        - name: "brand"
          type: "str"
          required: false
          description: "Manufacturer or brand name"
        - name: "model"
          type: "str"
          required: false
          description: "Model number or name"
        - name: "serial_number"
          type: "str"
          required: false
          description: "Serial number or unique identifier"